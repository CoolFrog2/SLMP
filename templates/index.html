<!DOCTYPE html>
<html lang="hu" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLMP PLC vezérlő</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="app">

    <!-- ───────── Felső sáv ───────── -->
    <header class="topbar">
      <div class="brand">
        <span class="brand-logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="6" y="6" width="12" height="12" rx="2"/>
            <path d="M9 1.5v3M12 1.5v3M15 1.5v3M9 19.5v3M12 19.5v3M15 19.5v3M1.5 9h3M1.5 12h3M1.5 15h3M19.5 9h3M19.5 12h3M19.5 15h3"/>
            <circle cx="12" cy="12" r="1.6"/>
          </svg>
        </span>
        <div class="brand-text">
          <h1>SLMP&nbsp;PLC</h1>
          <span>Mitsubishi Q · 3E binary · TCP</span>
        </div>
      </div>

      <div class="topbar-right">
        <div class="conn-pill" id="conn-pill" data-state="unknown">
          <span class="conn-dot"></span>
          <span id="conn-text">nincs kapcsolat</span>
        </div>
        <button class="icon-btn" id="theme-toggle" title="Téma váltása" aria-label="Téma váltása">
          <svg class="ic-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
          <svg class="ic-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 1.5v2.5M12 20v2.5M4.2 4.2l1.8 1.8M18 18l1.8 1.8M1.5 12H4M20 12h2.5M4.2 19.8 6 18M18 6l1.8-1.8"/></svg>
        </button>
      </div>
    </header>

    <main class="main">

      <!-- ───────── Kapcsolat ───────── -->
      <section class="panel">
        <div class="panel-head">
          <h2><span class="ph-icon">⚙</span> Kapcsolat</h2>
        </div>
        <div class="field-grid">
          <div class="field">
            <label for="ip">IP cím</label>
            <input type="text" id="ip" placeholder="192.168.0.10" autocomplete="off" spellcheck="false">
          </div>
          <div class="field field-sm">
            <label for="port">Port</label>
            <input type="number" id="port" placeholder="5007" min="1" max="65535">
          </div>
          <div class="field field-sm">
            <label for="timeout">Timeout (s)</label>
            <input type="number" id="timeout" value="3" min="1" max="60" step="0.5">
          </div>
          <div class="field">
            <label for="token">API token <span class="muted-tag">opcionális</span></label>
            <input type="password" id="token" placeholder="csak ha SLMP_TOKEN aktív" autocomplete="off">
          </div>
          <div class="field field-action">
            <label>&nbsp;</label>
            <button class="btn btn-ghost" id="btn-test">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
              <span>Kapcsolat teszt</span>
            </button>
          </div>
        </div>
      </section>

      <!-- ───────── Olvasás / Írás ───────── -->
      <div class="work-grid">

        <!-- Olvasás -->
        <section class="panel">
          <div class="panel-head">
            <h2><span class="ph-icon accent-read">↓</span> Olvasás</h2>
            <div class="segmented" id="read-mode">
              <button class="seg active" data-value="word">Word</button>
              <button class="seg" data-value="bit">Bit</button>
            </div>
          </div>

          <div class="field-grid">
            <div class="field">
              <label for="read-device">Eszköz</label>
              <input type="text" id="read-device" placeholder="pl. D100 vagy M0" spellcheck="false">
            </div>
            <div class="field field-sm">
              <label for="read-count">Darabszám</label>
              <input type="number" id="read-count" value="1" min="1" max="960">
            </div>
            <div class="field field-action">
              <label>&nbsp;</label>
              <button class="btn btn-primary" id="btn-read">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9"/><path d="M21 3v6h-6"/></svg>
                <span>Olvasás</span>
              </button>
            </div>
          </div>

          <div class="auto-row">
            <label class="switch">
              <input type="checkbox" id="auto-refresh">
              <span class="slider"></span>
            </label>
            <span class="auto-label">Auto-frissítés</span>
            <input type="number" id="auto-interval" value="1000" min="200" max="60000" step="100" class="auto-interval">
            <span class="muted-tag">ms</span>
          </div>

          <div class="results" id="read-result">
            <div class="empty">Még nincs olvasott adat.</div>
          </div>
        </section>

        <!-- Írás -->
        <section class="panel">
          <div class="panel-head">
            <h2><span class="ph-icon accent-write">↑</span> Írás</h2>
            <div class="segmented" id="write-mode">
              <button class="seg active" data-value="word">Word</button>
              <button class="seg" data-value="bit">Bit</button>
            </div>
          </div>

          <div class="field-grid">
            <div class="field field-sm">
              <label for="write-device">Eszköz</label>
              <input type="text" id="write-device" placeholder="pl. D100" spellcheck="false">
            </div>
            <div class="field">
              <label for="write-values">Értékek <span class="muted-tag">vesszővel</span></label>
              <input type="text" id="write-values" placeholder="word: 100, 0x1A, 255 · bit: 1,0,1" spellcheck="false">
            </div>
            <div class="field field-action">
              <label>&nbsp;</label>
              <button class="btn btn-danger" id="btn-write">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>
                <span>Írás</span>
              </button>
            </div>
          </div>

          <p class="hint" id="write-hint"></p>
          <div class="results" id="write-result">
            <div class="empty">Add meg az értékeket és írj a PLC-be.</div>
          </div>
        </section>
      </div>

      <!-- ───────── Napló ───────── -->
      <section class="panel">
        <div class="panel-head">
          <h2><span class="ph-icon">≡</span> Napló</h2>
          <button class="btn btn-ghost btn-xs" id="btn-clear-log">Törlés</button>
        </div>
        <div class="console" id="log"></div>
      </section>

    </main>
  </div>

  <div class="toasts" id="toasts"></div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
